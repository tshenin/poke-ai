<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poke AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 340px;
      padding: 20px;
      background: #f9fafb;
    }
    h1 {
      font-size: 18px;
      color: #111827;
      margin-bottom: 16px;
    }
    .status,
    .ticket {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .status.ready {
      background: #d1fae5;
      color: #065f46;
    }
    .status.warning {
      background: #fef3c7;
      color: #92400e;
    }
    .ticket {
      background: #eef2ff;
      color: #1e1b4b;
      border: 1px solid #c7d2fe;
    }
    .ticket-key {
      font-size: 12px;
      color: #4338ca;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .ticket-title {
      font-size: 14px;
      color: #111827;
      line-height: 1.4;
    }
    .last-triggered {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .btn-cloud {
      background: #3b82f6;
    }
    .btn-cloud:hover:not(:disabled) {
      background: #2563eb;
    }
    .btn-local {
      background: #7c3aed;
    }
    .btn-local:hover:not(:disabled) {
      background: #6d28d9;
    }
    .btn-annotate {
      background: #f59e0b;
    }
    .btn-annotate:hover:not(:disabled) {
      background: #d97706;
    }
    .btn-annotate.active {
      background: #ef4444;
    }
    .btn-annotate.active:hover:not(:disabled) {
      background: #dc2626;
    }
    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .hint {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
    }
    .settings-link {
      font-size: 12px;
      color: #6b7280;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      width: auto;
    }
    .settings-link:hover {
      color: #374151;
    }
    .agent-link {
      color: #065f46;
      font-weight: 600;
      text-decoration: underline;
    }
    .agent-link:hover {
      color: #047857;
    }
    .annotations-section {
      margin-bottom: 16px;
      padding: 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 8px;
    }
    .annotations-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .annotations-title {
      font-size: 13px;
      font-weight: 600;
      color: #9a3412;
    }
    .annotations-count {
      background: #f97316;
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .annotations-list {
      max-height: 120px;
      overflow-y: auto;
    }
    .annotation-item {
      font-size: 12px;
      color: #78350f;
      padding: 6px 0;
      border-bottom: 1px solid #fed7aa;
    }
    .annotation-item:last-child {
      border-bottom: none;
    }
    .annotation-note {
      font-weight: 500;
    }
    .annotation-selector {
      font-family: monospace;
      font-size: 10px;
      color: #a16207;
      margin-top: 2px;
      word-break: break-all;
    }
    .clear-annotations {
      font-size: 11px;
      color: #dc2626;
      background: none;
      border: none;
      padding: 0;
      width: auto;
      cursor: pointer;
      text-decoration: underline;
    }
    .clear-annotations:hover {
      color: #b91c1c;
    }
    .platform-section {
      margin-bottom: 16px;
      padding: 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
    }
    .platform-hint {
      font-size: 12px;
      color: #166534;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>🤖 Poke AI</h1>
  <div id="status" class="status"></div>
  <div id="ticket" class="ticket" style="display: none;">
    <div id="ticketKey" class="ticket-key"></div>
    <div id="ticketTitle" class="ticket-title"></div>
  </div>
  <div id="platformSection" class="platform-section" style="display: none;">
    <div class="platform-hint">You're on a platform page. Use annotation mode to mark UI elements for changes.</div>
  </div>
  <div id="annotationsSection" class="annotations-section" style="display: none;">
    <div class="annotations-header">
      <span class="annotations-title">🎯 Annotations</span>
      <span id="annotationsCount" class="annotations-count">0</span>
    </div>
    <div id="annotationsList" class="annotations-list"></div>
    <button id="clearAnnotations" class="clear-annotations">Clear all</button>
  </div>
  <div id="lastTriggered" class="last-triggered"></div>
  <div class="actions">
    <button id="toggleAnnotation" class="btn-annotate" style="display: none;">🎯 Start Annotation Mode</button>
    <button id="runCloudAgent" class="btn-cloud" disabled>Run Cloud Agent</button>
    <button id="runLocally" class="btn-local" disabled>Open in Cursor</button>
  </div>
  <div class="footer">
    <span class="hint">Pick how to run the agent for this ticket.</span>
    <button id="openSettings" class="settings-link">Settings</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
